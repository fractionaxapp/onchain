name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly — catch newly-disclosed patterns/rules

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Self-contained: gitleaks (secret scanning) and semgrep (SAST) scan this repo's
# own source statically — no monorepo reconstruction or cross-repo token needed.
jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so secrets in past commits are caught
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner

  semgrep:
    name: Static analysis (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install semgrep
        run: pip install semgrep
      - name: Run semgrep
        run: semgrep scan --config p/default --error
