# Program IDs below are placeholders (the System Program address). Run
# `anchor keys sync` after the first build to set the real, keypair-derived IDs.
[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
fractionax = "11111111111111111111111111111111"

[programs.devnet]
fractionax = "11111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "cargo test"
